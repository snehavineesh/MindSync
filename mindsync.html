<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSync - AI-Powered Student Wellness</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.5.0/dist/Recharts.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --bg-tertiary: #EEF2F6;
            --text-primary: #1A1A1A;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --border-color: #E5E7EB;
            --accent-purple: #7C3AED;
            --accent-purple-light: #A78BFA;
            --accent-teal: #14B8A6;
            --accent-teal-light: #5EEAD4;
            --accent-coral: #F97316;
            --danger-bg: #FEE2E2;
            --danger-text: #DC2626;
            --success-bg: #D1FAE5;
            --success-text: #059669;
            --warning-bg: #FEF3C7;
            --warning-text: #D97706;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1F2937;
            --bg-tertiary: #374151;
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
            --text-tertiary: #9CA3AF;
            --border-color: #374151;
            --accent-purple: #A78BFA;
            --accent-purple-light: #C4B5FD;
            --accent-teal: #5EEAD4;
            --accent-teal-light: #99F6E4;
            --accent-coral: #FB923C;
            --danger-bg: #7F1D1D;
            --danger-text: #FCA5A5;
            --success-bg: #064E3B;
            --success-text: #6EE7B7;
            --warning-bg: #78350F;
            --warning-text: #FCD34D;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background 0.3s ease, color 0.3s ease;
        }

        #root {
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0;
        }

        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-purple);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-teal));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--bg-tertiary);
            transform: scale(1.05);
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .nav-tab {
            background: transparent;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .nav-tab:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .nav-tab.active {
            background: var(--accent-purple);
            color: white;
        }

        .main-content {
            padding: 2rem;
        }

        .card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .journal-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .slider-value {
            font-weight: 600;
            color: var(--accent-purple);
            font-size: 1.1rem;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-tertiary);
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-purple);
            cursor: pointer;
            transition: all 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--accent-purple-light);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-purple);
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: vertical;
            transition: all 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-primary {
            background: var(--accent-purple);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-purple-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }

        .grid {
            display: grid;
            gap: 1.5rem;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .risk-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .risk-low {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .risk-medium {
            background: var(--warning-bg);
            color: var(--warning-text);
        }

        .risk-high {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        .alert {
            padding: 1rem 1.25rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: start;
        }

        .alert-warning {
            background: var(--warning-bg);
            color: var(--warning-text);
            border-left: 4px solid var(--warning-text);
        }

        .alert-danger {
            background: var(--danger-bg);
            color: var(--danger-text);
            border-left: 4px solid var(--danger-text);
        }

        .alert-info {
            background: #EEF2FF;
            color: #4F46E5;
            border-left: 4px solid #4F46E5;
        }

        [data-theme="dark"] .alert-info {
            background: #312E81;
            color: #C7D2FE;
        }

        .peer-rooms {
            display: grid;
            gap: 1rem;
        }

        .room-card {
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .room-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .room-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            background: var(--accent-purple);
            color: white;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-self {
            align-self: flex-end;
            background: var(--accent-purple);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-other {
            align-self: flex-start;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .message-author {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            opacity: 0.9;
        }

        .chat-input-container {
            padding: 1rem 1.5rem;
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 0.75rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }

        .timeline-container {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
        }

        .entry-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .entry-card {
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 10px;
            border-left: 4px solid var(--accent-teal);
        }

        .entry-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .entry-metrics {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        .entry-metric {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .metric-label {
            color: var(--text-secondary);
        }

        .metric-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .helpline-card {
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
        }

        .helpline-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .helpline-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .helpline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .helpline-number {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .disclaimer {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 1.5rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-tabs {
                width: 100%;
                justify-content: space-around;
            }

            .nav-tab {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }

            .main-content {
                padding: 1rem;
            }

            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
  window.Recharts = window.Recharts || {};
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // Simulated sentiment analysis (placeholder for Python backend)
        const analyzeSentiment = (text) => {
            const negativeWords = ['sad', 'depressed', 'anxious', 'stressed', 'overwhelmed', 'tired', 'exhausted', 'hopeless', 'alone', 'worried'];
            const positiveWords = ['happy', 'good', 'great', 'better', 'relaxed', 'calm', 'peaceful', 'excited', 'motivated'];
            
            const lowerText = text.toLowerCase();
            let score = 0.5;
            
            negativeWords.forEach(word => {
                if (lowerText.includes(word)) score -= 0.1;
            });
            
            positiveWords.forEach(word => {
                if (lowerText.includes(word)) score += 0.1;
            });
            
            return Math.max(0, Math.min(1, score));
        };

        const calculateBurnoutRisk = (entries) => {
            if (entries.length < 3) return 'LOW';
            
            const recentEntries = entries.slice(-7);
            const avgMood = recentEntries.reduce((sum, e) => sum + e.mood, 0) / recentEntries.length;
            const avgEnergy = recentEntries.reduce((sum, e) => sum + e.energy, 0) / recentEntries.length;
            const avgStress = recentEntries.reduce((sum, e) => sum + e.stress, 0) / recentEntries.length;
            const avgSentiment = recentEntries.reduce((sum, e) => sum + (e.sentiment || 0.5), 0) / recentEntries.length;
            
            const riskScore = (10 - avgMood) + (10 - avgEnergy) + avgStress + ((1 - avgSentiment) * 10);
            
            if (riskScore > 25) return 'HIGH';
            if (riskScore > 15) return 'MEDIUM';
            return 'LOW';
        };

        function App() {
            const [theme, setTheme] = useState('light');
            const [activeTab, setActiveTab] = useState('journal');
            const [journalEntries, setJournalEntries] = useState([]);
            const [currentEntry, setCurrentEntry] = useState({
                mood: 5,
                energy: 5,
                stress: 5,
                text: ''
            });
            const [activeRoom, setActiveRoom] = useState(null);
            const [chatMessages, setChatMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [anonName, setAnonName] = useState('');

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            useEffect(() => {
                // Generate anonymous name
                const colors = ['Blue', 'Purple', 'Teal', 'Coral', 'Pink', 'Amber'];
                const objects = ['Moon', 'Star', 'Cloud', 'Wave', 'Leaf', 'Spark'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const randomObject = objects[Math.floor(Math.random() * objects.length)];
                const randomNum = Math.floor(Math.random() * 100);
                setAnonName(`${randomColor}${randomObject}${randomNum}`);

                // Load sample data
                const sampleEntries = [
                    {
                        id: 1,
                        date: new Date(Date.now() - 6 * 24 * 60 * 60 * 1000).toISOString(),
                        mood: 7,
                        energy: 6,
                        stress: 4,
                        text: 'Feeling okay today. Had a good study session.',
                        sentiment: 0.7
                    },
                    {
                        id: 2,
                        date: new Date(Date.now() - 4 * 24 * 60 * 60 * 1000).toISOString(),
                        mood: 5,
                        energy: 4,
                        stress: 7,
                        text: 'Stressed about upcoming exams. Feeling overwhelmed.',
                        sentiment: 0.3
                    },
                    {
                        id: 3,
                        date: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString(),
                        mood: 6,
                        energy: 5,
                        stress: 6,
                        text: 'Better than yesterday but still anxious.',
                        sentiment: 0.5
                    }
                ];
                setJournalEntries(sampleEntries);
            }, []);

            const toggleTheme = () => {
                setTheme(theme === 'light' ? 'dark' : 'light');
            };

            const handleSliderChange = (field, value) => {
                setCurrentEntry({ ...currentEntry, [field]: parseInt(value) });
            };

            const handleTextChange = (e) => {
                setCurrentEntry({ ...currentEntry, text: e.target.value });
            };

            const submitJournalEntry = () => {
                if (!currentEntry.text.trim()) {
                    alert('Please write something in your journal entry');
                    return;
                }

                const sentiment = analyzeSentiment(currentEntry.text);
                const newEntry = {
                    id: journalEntries.length + 1,
                    date: new Date().toISOString(),
                    ...currentEntry,
                    sentiment
                };

                setJournalEntries([...journalEntries, newEntry]);
                setCurrentEntry({ mood: 5, energy: 5, stress: 5, text: '' });
                alert('Journal entry saved! 🎉');
            };

            const joinRoom = (room) => {
                setActiveRoom(room);
                setChatMessages([
                    { id: 1, author: 'TealStar23', text: 'Hey everyone, dealing with exam stress too 😓', isOwn: false },
                    { id: 2, author: 'PurpleLeaf56', text: 'Same here! What subjects are you worried about?', isOwn: false }
                ]);
            };

            const leaveRoom = () => {
                setActiveRoom(null);
                setChatMessages([]);
                setChatInput('');
            };

            const sendMessage = () => {
                if (!chatInput.trim()) return;

                const newMessage = {
                    id: chatMessages.length + 1,
                    author: anonName,
                    text: chatInput,
                    isOwn: true
                };

                setChatMessages([...chatMessages, newMessage]);
                setChatInput('');

                // Simulate response
                setTimeout(() => {
                    const responses = [
                        'I totally understand how you feel 💜',
                        'Have you tried the Pomodoro technique? It helps me a lot!',
                        'Remember to take breaks! You\'re doing great 🌟',
                        'We\'re all in this together. You\'ve got this!'
                    ];
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    setChatMessages(prev => [...prev, {
                        id: prev.length + 1,
                        author: 'CoralWave89',
                        text: randomResponse,
                        isOwn: false
                    }]);
                }, 1500);
            };

            const burnoutRisk = calculateBurnoutRisk(journalEntries);
            const chartData = journalEntries.map(entry => ({
                date: new Date(entry.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                mood: entry.mood,
                energy: entry.energy,
                stress: entry.stress
            }));

            const peerRooms = [
                { id: 1, title: '📚 Exam Stress Support', members: 12, description: 'Share tips and encouragement for exam preparation' },
                { id: 2, title: '👨‍👩‍👧 Family Pressure', members: 8, description: 'Discuss challenges with family expectations' },
                { id: 3, title: '🎭 Imposter Syndrome', members: 15, description: 'You belong here - let\'s talk about it' },
                { id: 4, title: '😔 Feeling Lonely', members: 6, description: 'Connect with others who understand' },
                { id: 5, title: '💪 Motivation & Goals', members: 20, description: 'Share your wins and stay motivated together' }
            ];

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="header-content">
                            <div className="logo">
                                <div className="logo-icon">🧠</div>
                                <span>MindSync</span>
                            </div>
                            <div className="header-actions">
                                <nav className="nav-tabs">
                                    <button 
                                        className={`nav-tab ${activeTab === 'journal' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('journal')}
                                    >
                                        📓 Journal
                                    </button>
                                    <button 
                                        className={`nav-tab ${activeTab === 'timeline' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('timeline')}
                                    >
                                        📊 Timeline
                                    </button>
                                    <button 
                                        className={`nav-tab ${activeTab === 'peer' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('peer')}
                                    >
                                        👥 Peer Support
                                    </button>
                                </nav>
                                <button className="theme-toggle" onClick={toggleTheme}>
                                    {theme === 'light' ? '🌙' : '☀️'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="main-content">
                        {activeTab === 'journal' && (
                            <div className="fade-in">
                                {burnoutRisk === 'HIGH' && (
                                    <div className="alert alert-danger">
                                        <div>
                                            <strong>⚠️ We noticed you might be experiencing high stress</strong>
                                            <p style={{ marginTop: '0.5rem' }}>Consider taking a break, talking to a friend, or joining a peer support room. You're not alone in this.</p>
                                        </div>
                                    </div>
                                )}

                                {burnoutRisk === 'MEDIUM' && (
                                    <div className="alert alert-warning">
                                        <div>
                                            <strong>💡 Gentle reminder</strong>
                                            <p style={{ marginTop: '0.5rem' }}>Your stress levels have been elevated. Remember to take care of yourself - maybe go for a walk or chat with friends?</p>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-3">
                                    <div className="stat-card">
                                        <div className="stat-icon">😊</div>
                                        <div className="stat-label">Current Mood</div>
                                        <div className="stat-value">{currentEntry.mood}/10</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="stat-icon">⚡</div>
                                        <div className="stat-label">Energy Level</div>
                                        <div className="stat-value">{currentEntry.energy}/10</div>
                                    </div>
                                    <div className="stat-card">
                                        <div className="stat-icon">😰</div>
                                        <div className="stat-label">Stress Level</div>
                                        <div className="stat-value">{currentEntry.stress}/10</div>
                                    </div>
                                </div>

                                <div className="card" style={{ marginTop: '1.5rem' }}>
                                    <h2 className="card-title">Daily Check-in</h2>
                                    <div className="journal-form">
                                        <div className="slider-group">
                                            <div className="slider-label">
                                                <span>How are you feeling today?</span>
                                                <span className="slider-value">{currentEntry.mood}/10</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="1" 
                                                max="10" 
                                                value={currentEntry.mood}
                                                onChange={(e) => handleSliderChange('mood', e.target.value)}
                                            />
                                        </div>

                                        <div className="slider-group">
                                            <div className="slider-label">
                                                <span>What's your energy level?</span>
                                                <span className="slider-value">{currentEntry.energy}/10</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="1" 
                                                max="10" 
                                                value={currentEntry.energy}
                                                onChange={(e) => handleSliderChange('energy', e.target.value)}
                                            />
                                        </div>

                                        <div className="slider-group">
                                            <div className="slider-label">
                                                <span>How stressed are you?</span>
                                                <span className="slider-value">{currentEntry.stress}/10</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="1" 
                                                max="10" 
                                                value={currentEntry.stress}
                                                onChange={(e) => handleSliderChange('stress', e.target.value)}
                                            />
                                        </div>

                                        <div>
                                            <label style={{ display: 'block', marginBottom: '0.5rem', color: 'var(--text-secondary)', fontSize: '0.9rem' }}>
                                                What's on your mind? (optional)
                                            </label>
                                            <textarea 
                                                placeholder="Write a quick note about your day..."
                                                value={currentEntry.text}
                                                onChange={handleTextChange}
                                            />
                                        </div>

                                        <button className="btn btn-primary" onClick={submitJournalEntry}>
                                            Save Entry ✨
                                        </button>
                                    </div>
                                </div>

                                <div className="disclaimer">
                                    <strong>📌 Important:</strong> MindSync is a supportive tool for students but is not a replacement for professional mental health care. If you're experiencing severe distress, please reach out to a counselor, therapist, or the helplines listed below.
                                </div>

                                <div className="helpline-card">
                                    <div className="helpline-title">🆘 Crisis Support Helplines (India)</div>
                                    <div className="helpline-list">
                                        <div className="helpline-item">
                                            <span>iCall Helpline</span>
                                            <a href="tel:9152987821" className="helpline-number" style={{ color: 'white', textDecoration: 'none' }}>9152987821</a>
                                        </div>
                                        <div className="helpline-item">
                                            <span>Vandrevala Foundation</span>
                                            <a href="tel:18602662345" className="helpline-number" style={{ color: 'white', textDecoration: 'none' }}>1860 2662 345</a>
                                        </div>
                                        <div className="helpline-item">
                                            <span>AASRA</span>
                                            <a href="tel:9820466726" className="helpline-number" style={{ color: 'white', textDecoration: 'none' }}>9820466726</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'timeline' && (
                            <div className="fade-in">
                                <div className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                        <h2 className="card-title" style={{ margin: 0 }}>Your Mental Health Journey</h2>
                                        <div className={`risk-badge risk-${burnoutRisk.toLowerCase()}`}>
                                            {burnoutRisk} Risk
                                        </div>
                                    </div>

                                    {journalEntries.length > 0 ? (
                                        <>
                                            <div style={{ height: '400px', marginTop: '1.5rem' }}>
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={chartData}>
                                                        <CartesianGrid strokeDasharray="3 3" stroke="var(--border-color)" />
                                                        <XAxis 
                                                            dataKey="date" 
                                                            stroke="var(--text-secondary)"
                                                            style={{ fontSize: '0.85rem' }}
                                                        />
                                                        <YAxis 
                                                            stroke="var(--text-secondary)"
                                                            style={{ fontSize: '0.85rem' }}
                                                        />
                                                        <Tooltip 
                                                            contentStyle={{
                                                                backgroundColor: 'var(--bg-primary)',
                                                                border: '1px solid var(--border-color)',
                                                                borderRadius: '8px',
                                                                color: 'var(--text-primary)'
                                                            }}
                                                        />
                                                        <Legend />
                                                        <Line 
                                                            type="monotone" 
                                                            dataKey="mood" 
                                                            stroke="#7C3AED" 
                                                            strokeWidth={3}
                                                            name="Mood"
                                                        />
                                                        <Line 
                                                            type="monotone" 
                                                            dataKey="energy" 
                                                            stroke="#14B8A6" 
                                                            strokeWidth={3}
                                                            name="Energy"
                                                        />
                                                        <Line 
                                                            type="monotone" 
                                                            dataKey="stress" 
                                                            stroke="#F97316" 
                                                            strokeWidth={3}
                                                            name="Stress"
                                                        />
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>

                                            <div className="entry-list" style={{ marginTop: '2rem' }}>
                                                <h3 style={{ fontSize: '1.1rem', marginBottom: '1rem' }}>Recent Entries</h3>
                                                {journalEntries.slice().reverse().map(entry => (
                                                    <div key={entry.id} className="entry-card">
                                                        <div className="entry-date">
                                                            {new Date(entry.date).toLocaleDateString('en-US', { 
                                                                weekday: 'long', 
                                                                year: 'numeric', 
                                                                month: 'long', 
                                                                day: 'numeric' 
                                                            })}
                                                        </div>
                                                        <p style={{ color: 'var(--text-primary)', marginTop: '0.5rem' }}>
                                                            {entry.text}
                                                        </p>
                                                        <div className="entry-metrics">
                                                            <div className="entry-metric">
                                                                <span className="metric-label">Mood:</span>
                                                                <span className="metric-value">{entry.mood}/10</span>
                                                            </div>
                                                            <div className="entry-metric">
                                                                <span className="metric-label">Energy:</span>
                                                                <span className="metric-value">{entry.energy}/10</span>
                                                            </div>
                                                            <div className="entry-metric">
                                                                <span className="metric-label">Stress:</span>
                                                                <span className="metric-value">{entry.stress}/10</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </>
                                    ) : (
                                        <div className="empty-state">
                                            <div className="empty-state-icon">📊</div>
                                            <p>No entries yet. Start journaling to see your mood trends!</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'peer' && (
                            <div className="fade-in">
                                {!activeRoom ? (
                                    <>
                                        <div className="alert alert-info">
                                            <div>
                                                <strong>🔒 Anonymous & Safe</strong>
                                                <p style={{ marginTop: '0.5rem' }}>You'll join as <strong>{anonName}</strong>. Your identity is protected. Be kind, be supportive.</p>
                                            </div>
                                        </div>

                                        <div className="card">
                                            <h2 className="card-title">Peer Support Rooms</h2>
                                            <div className="peer-rooms">
                                                {peerRooms.map(room => (
                                                    <div 
                                                        key={room.id} 
                                                        className="room-card"
                                                        onClick={() => joinRoom(room)}
                                                    >
                                                        <div className="room-title">{room.title}</div>
                                                        <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', margin: '0.5rem 0' }}>
                                                            {room.description}
                                                        </p>
                                                        <div className="room-meta">
                                                            <span>👥 {room.members} online</span>
                                                            <span>🟢 Active now</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="card">
                                        <div className="chat-container">
                                            <div className="chat-header">
                                                <span>{activeRoom.title}</span>
                                                <button 
                                                    className="btn-secondary" 
                                                    style={{ padding: '0.5rem 1rem', fontSize: '0.85rem' }}
                                                    onClick={leaveRoom}
                                                >
                                                    Leave Room
                                                </button>
                                            </div>
                                            <div className="chat-messages">
                                                {chatMessages.map(msg => (
                                                    <div 
                                                        key={msg.id} 
                                                        className={`message ${msg.isOwn ? 'message-self' : 'message-other'}`}
                                                    >
                                                        {!msg.isOwn && (
                                                            <div className="message-author">{msg.author}</div>
                                                        )}
                                                        <div>{msg.text}</div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="chat-input-container">
                                                <input 
                                                    type="text" 
                                                    className="chat-input"
                                                    placeholder="Type your message..."
                                                    value={chatInput}
                                                    onChange={(e) => setChatInput(e.target.value)}
                                                    onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                                />
                                                <button className="btn btn-primary" onClick={sendMessage}>
                                                    Send
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
